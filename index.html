<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Q4PRACTISE1</title>
</head>
<body>
    <h1>JAVASCRIPT CONDITIONAL STATEMENTS</h1>
    <div container></div>

    <input type="text" id="age" placeholder="Enter your age">

    <button class="btn btn-info" onclick="checkAge()">Check Age</button>

    <script>

        function checkAge(){
            var age = document.getElementById("age").value;

            if(isNaN(age) || age < 0){
                alert("Please enter a valid age.");
            }
            else if (age<18){
                alert("too young...");
            }
        

        else if(age>18){
            alert("Wassup");

        }

        else {
            alert("Age could not be determined");
        }
    }
    

    </script>
    
</body>
</html>
